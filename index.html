<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Finance Tracker</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root {
    --bg: #0b1120; --bg2: #0f172a; --panel: #1e293b; --panel2: #273449;
    --border: #334155; --text: #e2e8f0; --muted: #94a3b8;
    --accent: #2dd4bf; --accent2: #38bdf8;
    --green: #34d399; --red: #f87171; --yellow: #fbbf24; --purple: #a78bfa;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }

  .app { display: flex; min-height: 100vh; }
  .sidebar { width: 240px; background: var(--bg2); border-right: 1px solid var(--border); padding: 24px 16px; position: sticky; top: 0; height: 100vh; flex-shrink: 0; }
  .brand { display: flex; align-items: center; gap: 10px; font-size: 20px; font-weight: 700; margin-bottom: 28px; padding: 0 8px; }
  .brand .dot { width: 12px; height: 12px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 12px var(--accent); }
  .nav button { display: flex; align-items: center; gap: 12px; width: 100%; text-align: left; background: transparent; border: none; color: var(--muted); padding: 12px 14px; border-radius: 10px; font-size: 15px; cursor: pointer; margin-bottom: 4px; transition: all .15s; }
  .nav button:hover { background: var(--panel); color: var(--text); }
  .nav button.active { background: linear-gradient(90deg, rgba(45,212,191,.18), rgba(56,189,248,.08)); color: var(--accent); font-weight: 600; }
  .nav button .ico { font-size: 18px; width: 22px; text-align: center; }

  .main { flex: 1; padding: 32px 40px; max-width: 1200px; }
  @media (max-width: 760px) {
    .app { flex-direction: column; }
    .sidebar { width: 100%; height: auto; position: static; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .brand { margin-bottom: 0; margin-right: auto; }
    .nav { display: flex; flex-wrap: wrap; gap: 4px; }
    .nav button { width: auto; padding: 8px 12px; }
    .nav button .label { display: none; }
    .nav button .ico { font-size: 20px; }
    .main { padding: 20px 16px; }
  }
  .page-title { font-size: 26px; font-weight: 700; margin: 0 0 4px; }
  .page-sub { color: var(--muted); margin: 0 0 28px; font-size: 14px; }

  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 18px; margin-bottom: 28px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 22px; }
  .card .label { color: var(--muted); font-size: 13px; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }
  .card .value { font-size: 26px; font-weight: 700; word-break: break-word; }
  .card .sub { font-size: 13px; color: var(--muted); margin-top: 6px; }
  .pos { color: var(--green); } .neg { color: var(--red); }

  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 22px; margin-bottom: 22px; }
  .panel h3 { margin: 0 0 18px; font-size: 17px; display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap: wrap; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
  @media (max-width: 900px) { .grid2 { grid-template-columns: 1fr; } }

  input, select { background: var(--bg2); border: 1px solid var(--border); color: var(--text); padding: 10px 12px; border-radius: 10px; font-size: 14px; width: 100%; outline: none; font-family: inherit; }
  input:focus, select:focus { border-color: var(--accent); }
  label.field { display: block; }
  label.field span { display:block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .form-row { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); align-items: end; }

  button.btn { background: var(--accent); color: #04231f; border: none; padding: 11px 18px; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 14px; white-space: nowrap; font-family: inherit; }
  button.btn:hover { filter: brightness(1.08); }
  button.btn.ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
  button.btn.ghost:hover { background: var(--panel2); }
  button.btn.sm { padding: 7px 12px; font-size: 13px; }
  button.icon-btn { background: transparent; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 4px 8px; border-radius: 8px; }
  button.icon-btn:hover { color: var(--red); background: rgba(248,113,113,.1); }

  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: .4px; padding: 10px 12px; border-bottom: 1px solid var(--border); }
  td { padding: 12px; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  .tag { padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
  .tag.income { background: rgba(52,211,153,.15); color: var(--green); }
  .tag.expense { background: rgba(248,113,113,.15); color: var(--red); }

  .progress { height: 10px; background: var(--bg2); border-radius: 999px; overflow: hidden; }
  .progress > div { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width .4s; }

  .goal { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 18px; }
  .empty { color: var(--muted); text-align: center; padding: 30px; font-size: 14px; }
  .row-between { display:flex; align-items:center; justify-content: space-between; gap: 12px; }
  .mini { font-size: 12px; color: var(--muted); }
  .toolbar { display:flex; gap: 10px; flex-wrap: wrap; align-items:center; }
  .hint { background: rgba(56,189,248,.08); border: 1px solid rgba(56,189,248,.25); color: #bae6fd; padding: 12px 16px; border-radius: 12px; font-size: 13px; margin-bottom: 22px; }
  .legend { list-style: none; padding: 0; margin: 12px 0 0; }
  .legend li { display: flex; align-items: center; gap: 10px; font-size: 13px; padding: 5px 0; }
  .legend .sw { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
  .legend .amt { margin-left: auto; color: var(--muted); }
  .chart-wrap { width: 100%; }
</style>
</head>
<body>
<div id="root"></div>

<script>
"use strict";
(function () {
  var STORAGE_KEY = "financeTracker_v1";
  var COLORS = ["#2dd4bf","#38bdf8","#a78bfa","#fbbf24","#f87171","#34d399","#fb7185","#60a5fa","#f472b6","#facc15"];
  var CATEGORIES = ["Salary","Freelance","Gift","Food","Rent","Utilities","Transport","Shopping","Entertainment","Health","Savings","Other"];

  var defaultData = {
    openingBalance: 0,
    transactions: [], goals: [], debts: [],
    emergency: { monthlyExpenses: 0, months: 3, current: 0 },
    currency: "$"
  };

  var state, currentTab = "dashboard";

  function load() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return clone(defaultData);
      var obj = JSON.parse(raw);
      return Object.assign(clone(defaultData), obj);
    } catch (e) { return clone(defaultData); }
  }
  function saveLocal() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {} }
  function save() { saveLocal(); cloudPush(); }
  function clone(o) { return JSON.parse(JSON.stringify(o)); }
  function uid() { return Math.random().toString(36).slice(2, 10); }
  function esc(s) { return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) { return ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" })[c]; }); }
  function num(v) { var n = parseFloat(v); return isNaN(n) ? 0 : n; }
  function fmt(n) { return (state.currency || "$") + num(n).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
  function today() { return new Date().toISOString().slice(0, 10); }
  function el(id) { return document.getElementById(id); }
  function val(id) { var e = el(id); return e ? e.value : ""; }
  function msg(t) { var m = el("dataMsg"); if (m) m.innerHTML = '<div class="hint">' + esc(t) + '</div>'; }

  /* ---------- cloud sync (Firebase, optional & local-first) ---------- */
  var cloud = { app: null, auth: null, db: null, user: null, unsub: null, ready: false };
  var BUILT_IN_CONFIG = {
    apiKey: "AIzaSyAs1C-3Ibb9Nnw9yVtp9r797Lz-MHssvQg",
    authDomain: "finance-tracker-8cfe3.firebaseapp.com",
    projectId: "finance-tracker-8cfe3",
    storageBucket: "finance-tracker-8cfe3.firebasestorage.app",
    messagingSenderId: "511926344039",
    appId: "1:511926344039:web:11cf76fbe9af76b54c37c2"
  };
  function fbAvailable() { return typeof firebase !== "undefined" && firebase && firebase.initializeApp; }
  function getCfg() {
    try { var c = JSON.parse(localStorage.getItem("fb_config")); if (c && c.apiKey) return c; } catch (e) {}
    return (BUILT_IN_CONFIG && BUILT_IN_CONFIG.apiKey) ? BUILT_IN_CONFIG : null;
  }

  function initCloud() {
    if (cloud.ready) return true;
    if (!fbAvailable()) return false;
    var cfg = getCfg(); if (!cfg) return false;
    try {
      cloud.app = firebase.initializeApp(cfg);
      cloud.auth = firebase.auth();
      cloud.db = firebase.firestore();
      try { cloud.db.enablePersistence({ synchronizeTabs: true }).catch(function () {}); } catch (e) {}
      cloud.auth.onAuthStateChanged(function (u) {
        cloud.user = u;
        if (u) { subscribe(); } else if (cloud.unsub) { cloud.unsub(); cloud.unsub = null; }
        if (currentTab === "data") render();
      });
      cloud.ready = true;
      return true;
    } catch (e) { return false; }
  }

  function subscribe() {
    if (!cloud.user || !cloud.db) return;
    if (cloud.unsub) cloud.unsub();
    cloud.unsub = cloud.db.collection("users").doc(cloud.user.uid).onSnapshot(function (doc) {
      if (doc.metadata.hasPendingWrites) return; // ignore our own just-written change
      var d = doc.data();
      if (d && d.payload) {
        try { state = Object.assign(clone(defaultData), JSON.parse(d.payload)); saveLocal(); render(); } catch (e) {}
      } else { cloudPush(); } // cloud empty: seed it from this device
    }, function (err) { if (currentTab === "data") msg("Sync error: " + err.message); });
  }

  var pushTimer = null;
  function cloudPush() {
    if (!cloud.user || !cloud.db) return;
    clearTimeout(pushTimer);
    pushTimer = setTimeout(function () {
      cloud.db.collection("users").doc(cloud.user.uid).set({ payload: JSON.stringify(state), updated: Date.now() }).catch(function () {});
    }, 600);
  }

  /* ---------- derived ---------- */
  function totals() {
    var income = 0, expense = 0;
    state.transactions.forEach(function (t) { if (t.type === "income") income += num(t.amount); else expense += num(t.amount); });
    var balance = num(state.openingBalance) + income - expense;
    var totalDebt = state.debts.reduce(function (s, d) { return s + num(d.remaining); }, 0);
    var goalSavings = state.goals.reduce(function (s, g) { return s + num(g.current); }, 0);
    var emFund = num(state.emergency.current);
    var netWorth = balance + goalSavings + emFund - totalDebt;
    return { income: income, expense: expense, balance: balance, totalDebt: totalDebt, goalSavings: goalSavings, emFund: emFund, netWorth: netWorth };
  }

  function payoffMonths(remaining, annualRate, payment) {
    remaining = num(remaining); payment = num(payment);
    var r = num(annualRate) / 100 / 12;
    if (remaining <= 0) return 0;
    if (payment <= 0) return Infinity;
    if (r === 0) return Math.ceil(remaining / payment);
    if (payment <= remaining * r) return Infinity;
    return Math.ceil(-Math.log(1 - (r * remaining) / payment) / Math.log(1 + r));
  }

  /* ---------- SVG charts (no dependencies) ---------- */
  function areaChart(series) {
    if (!series.length) return '<div class="empty">Add transactions to see your balance trend.</div>';
    var w = 600, h = 240, p = 34;
    var vals = series.map(function (s) { return s.balance; });
    var min = Math.min.apply(null, vals.concat([0])), max = Math.max.apply(null, vals.concat([0]));
    if (min === max) { max += 1; min -= 1; }
    var n = series.length;
    function X(i) { return p + (n === 1 ? (w - 2 * p) / 2 : (i / (n - 1)) * (w - 2 * p)); }
    function Y(v) { return h - p - ((v - min) / (max - min)) * (h - 2 * p); }
    var pts = series.map(function (s, i) { return X(i) + "," + Y(s.balance); });
    var area = "M" + X(0) + "," + (h - p) + " L" + pts.join(" L") + " L" + X(n - 1) + "," + (h - p) + " Z";
    var zeroY = Y(0);
    var dots = series.map(function (s, i) { return '<circle cx="' + X(i) + '" cy="' + Y(s.balance) + '" r="3" fill="#2dd4bf" />'; }).join("");
    return '<div class="chart-wrap"><svg viewBox="0 0 ' + w + ' ' + h + '" width="100%" preserveAspectRatio="xMidYMid meet">' +
      '<defs><linearGradient id="ga" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.45"/><stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/></linearGradient></defs>' +
      '<line x1="' + p + '" y1="' + zeroY + '" x2="' + (w - p) + '" y2="' + zeroY + '" stroke="#334155" stroke-dasharray="3 3"/>' +
      '<path d="' + area + '" fill="url(#ga)"/>' +
      '<polyline points="' + pts.join(" ") + '" fill="none" stroke="#2dd4bf" stroke-width="2.5"/>' + dots +
      '<text x="' + p + '" y="16" fill="#94a3b8" font-size="11">' + fmt(max) + '</text>' +
      '<text x="' + p + '" y="' + (h - 10) + '" fill="#94a3b8" font-size="11">' + fmt(min) + '</text>' +
      '</svg></div>';
  }

  function donut(items, centerLabel, centerSub) {
    var total = items.reduce(function (s, i) { return s + i.value; }, 0);
    if (total <= 0) return '<div class="empty">No data yet.</div>';
    var R = 60, W = 22, C = 2 * Math.PI * R, off = 0;
    var segs = items.map(function (it, idx) {
      var frac = it.value / total, len = frac * C;
      var s = '<circle cx="80" cy="80" r="' + R + '" fill="none" stroke="' + it.color + '" stroke-width="' + W + '" stroke-dasharray="' + len + ' ' + (C - len) + '" stroke-dashoffset="' + (-off) + '"/>';
      off += len; return s;
    }).join("");
    var center = centerLabel ? '<text x="80" y="78" text-anchor="middle" fill="' + (centerSub === "accent" ? "#2dd4bf" : "#e2e8f0") + '" font-size="26" font-weight="700">' + centerLabel + '</text>' +
      '<text x="80" y="98" text-anchor="middle" fill="#94a3b8" font-size="11">' + (centerSub === "accent" ? "funded" : "") + '</text>' : "";
    return '<svg viewBox="0 0 160 160" width="170" height="170" style="display:block;margin:0 auto"><g transform="rotate(-90 80 80)">' +
      '<circle cx="80" cy="80" r="' + R + '" fill="none" stroke="#0f172a" stroke-width="' + W + '"/>' + segs + '</g>' + center + '</svg>';
  }

  function legend(items) {
    return '<ul class="legend">' + items.map(function (i) {
      return '<li><span class="sw" style="background:' + i.color + '"></span>' + esc(i.name) + '<span class="amt">' + fmt(i.value) + '</span></li>';
    }).join("") + '</ul>';
  }

  /* ---------- pages ---------- */
  function pageDashboard() {
    var t = totals();
    var sorted = state.transactions.slice().sort(function (a, b) { return (a.date || "").localeCompare(b.date || ""); });
    var running = num(state.openingBalance), map = {};
    sorted.forEach(function (tx) { running += tx.type === "income" ? num(tx.amount) : -num(tx.amount); map[tx.date] = running; });
    var series = Object.keys(map).sort().map(function (d) { return { date: d, balance: map[d] }; });

    var catMap = {};
    state.transactions.forEach(function (tx) { if (tx.type === "expense") { var c = tx.category || "Other"; catMap[c] = (catMap[c] || 0) + num(tx.amount); } });
    var cats = Object.keys(catMap).map(function (k, i) { return { name: k, value: catMap[k], color: COLORS[i % COLORS.length] }; });

    var comp = [
      { name: "Cash Balance", value: Math.max(0, t.balance), color: COLORS[0] },
      { name: "Goal Savings", value: t.goalSavings, color: COLORS[1] },
      { name: "Emergency Fund", value: t.emFund, color: COLORS[2] }
    ].filter(function (x) { return x.value > 0; });
    var compMax = comp.reduce(function (m, x) { return Math.max(m, x.value); }, 1);
    var compHtml = comp.length ? comp.map(function (x) {
      return '<div style="margin-bottom:14px"><div class="row-between" style="margin-bottom:6px"><span>' + x.name + '</span><strong>' + fmt(x.value) + '</strong></div>' +
        '<div class="progress"><div style="width:' + (x.value / compMax * 100) + '%;background:' + x.color + '"></div></div></div>';
    }).join("") : '<div class="empty">Add data to see your net worth breakdown.</div>';

    return '<h1 class="page-title">Dashboard</h1><p class="page-sub">Your complete financial picture at a glance.</p>' +
      '<div class="panel"><h3>Starting Balance</h3>' +
        '<p class="mini" style="margin:-8px 0 14px">Enter the cash you have right now. Your balance below = this + income − expenses.</p>' +
        '<div class="form-row" style="max-width:420px">' +
          '<label class="field"><span>Current cash on hand (' + (state.currency || "$") + ')</span><input id="ob_input" type="number" value="' + num(state.openingBalance) + '"/></label>' +
          '<button class="btn" data-act="setOB">Save</button>' +
        '</div></div>' +
      '<div class="cards">' +
        card("💰 Current Balance", fmt(t.balance), "Income " + fmt(t.income) + " · Expenses " + fmt(t.expense), t.balance >= 0 ? "pos" : "neg") +
        card("◍ Total Debt", fmt(t.totalDebt), state.debts.length + " debt" + (state.debts.length !== 1 ? "s" : "") + " tracked", "neg") +
        card("⛨ Emergency Fund", fmt(t.emFund), "Target " + fmt(num(state.emergency.monthlyExpenses) * num(state.emergency.months)), "") +
        card("📈 Net Worth", fmt(t.netWorth), "Assets minus debts", t.netWorth >= 0 ? "pos" : "neg") +
      '</div>' +
      '<div class="grid2">' +
        '<div class="panel"><h3>Balance Over Time</h3>' + areaChart(series) + '</div>' +
        '<div class="panel"><h3>Spending by Category</h3>' + (cats.length ? donut(cats) + legend(cats) : '<div class="empty">No expenses logged yet.</div>') + '</div>' +
      '</div>' +
      '<div class="panel"><h3>Net Worth Composition</h3>' + compHtml + '</div>';
  }

  function card(label, value, sub, cls) {
    return '<div class="card"><div class="label">' + label + '</div><div class="value ' + (cls || "") + '">' + value + '</div>' + (sub ? '<div class="sub">' + sub + '</div>' : '') + '</div>';
  }

  function goalTimeframe(g) {
    if (!g.deadline) return "";
    var remaining = num(g.target) - num(g.current);
    var dl = new Date(g.deadline + "T00:00:00");
    var label = dl.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
    var days = Math.round((dl.getTime() - new Date(today() + "T00:00:00").getTime()) / 86400000);
    if (remaining <= 0) return '<div class="mini" style="margin-top:8px;color:var(--green)">✓ Reached — target ' + label + '</div>';
    if (days < 0) return '<div class="mini" style="margin-top:8px;color:var(--red)">⚠ Past due (' + label + ') · ' + fmt(remaining) + ' to go</div>';
    if (days <= 31) return '<div class="mini" style="margin-top:8px">🎯 ' + label + ' · ' + days + ' day' + (days === 1 ? "" : "s") + ' left · ' + fmt(remaining) + ' to go</div>';
    var months = days / 30.44;
    return '<div class="mini" style="margin-top:8px">🎯 ' + label + ' · ' + Math.round(months) + ' mo left · save <strong>' + fmt(remaining / months) + '</strong>/mo</div>';
  }

  function pageGoals() {
    var cur = state.currency || "$";
    var list = state.goals.length ? '<div class="cards">' + state.goals.map(function (g) {
      var pct = num(g.target) > 0 ? Math.min(100, num(g.current) / num(g.target) * 100) : 0;
      return '<div class="goal"><div class="row-between"><strong style="font-size:16px">' + esc(g.name) + '</strong>' +
        '<button class="icon-btn" data-act="delGoal" data-id="' + g.id + '">✕</button></div>' +
        '<div class="mini" style="margin:10px 0 8px">' + fmt(g.current) + ' of ' + fmt(g.target) + ' · ' + pct.toFixed(0) + '%</div>' +
        '<div class="progress"><div style="width:' + pct + '%"></div></div>' +
        goalTimeframe(g) +
        '<div class="toolbar" style="margin-top:14px">' +
          '<button class="btn ghost sm" data-act="goal" data-id="' + g.id + '" data-amt="50">+50</button>' +
          '<button class="btn ghost sm" data-act="goal" data-id="' + g.id + '" data-amt="100">+100</button>' +
          '<button class="btn ghost sm" data-act="goal" data-id="' + g.id + '" data-amt="500">+500</button>' +
          '<button class="btn ghost sm" data-act="goal" data-id="' + g.id + '" data-amt="-50">−50</button>' +
        '</div></div>';
    }).join("") + '</div>' : '<div class="panel"><div class="empty">No goals yet — add your first above.</div></div>';

    return '<h1 class="page-title">Savings Goals</h1><p class="page-sub">Set targets and watch your progress grow.</p>' +
      '<div class="panel"><h3>Add a Goal</h3><div class="form-row">' +
        '<label class="field"><span>Goal name</span><input id="g_name" placeholder="e.g. New laptop"/></label>' +
        '<label class="field"><span>Target (' + cur + ')</span><input id="g_target" type="number" placeholder="2000"/></label>' +
        '<label class="field"><span>Saved so far (' + cur + ')</span><input id="g_current" type="number" placeholder="0"/></label>' +
        '<label class="field"><span>Target date (optional)</span><input id="g_deadline" type="date"/></label>' +
        '<button class="btn" data-act="addGoal">+ Add Goal</button>' +
      '</div></div>' + list;
  }

  function pageDebt() {
    var t = totals();
    var monthly = state.debts.reduce(function (s, d) { return s + num(d.payment); }, 0);
    var anyNever = false, longest = 0;
    state.debts.forEach(function (d) { var n = payoffMonths(d.remaining, d.rate, d.payment); if (n === Infinity) anyNever = true; else longest = Math.max(longest, n); });

    var rows = state.debts.length ? state.debts.map(function (d) {
      var n = payoffMonths(d.remaining, d.rate, d.payment);
      var paid = num(d.total) > 0 ? Math.min(100, (num(d.total) - num(d.remaining)) / num(d.total) * 100) : 0;
      return '<tr><td><strong>' + esc(d.creditor) + '</strong></td><td class="neg">' + fmt(d.remaining) + '</td><td>' + fmt(d.total) + '</td>' +
        '<td>' + num(d.rate).toFixed(2) + '%</td><td>' + fmt(d.payment) + '</td>' +
        '<td>' + (n === Infinity ? '<span class="neg">never</span>' : n + ' mo') + '</td>' +
        '<td style="min-width:120px"><div class="progress"><div style="width:' + paid + '%"></div></div><div class="mini" style="margin-top:4px">' + paid.toFixed(0) + '% paid</div></td>' +
        '<td><button class="icon-btn" data-act="delDebt" data-id="' + d.id + '">✕</button></td></tr>';
    }).join("") : '';

    return '<h1 class="page-title">Debt Tracker</h1><p class="page-sub">Track balances, rates, and estimated payoff.</p>' +
      '<div class="cards">' +
        card("Total Debt", fmt(t.totalDebt), "", "neg") +
        card("Monthly Payments", fmt(monthly), "", "") +
        card("Est. Debt-Free In", anyNever ? "—" : (longest > 0 ? longest + " mo" : "0 mo"), anyNever ? "A payment is too low to ever clear" : (longest > 0 ? "≈ " + (longest / 12).toFixed(1) + " years" : "All clear"), "") +
      '</div>' +
      '<div class="panel"><h3>Add a Debt</h3><div class="form-row">' +
        '<label class="field"><span>Creditor</span><input id="d_creditor" placeholder="Visa"/></label>' +
        '<label class="field"><span>Original total</span><input id="d_total" type="number" placeholder="5000"/></label>' +
        '<label class="field"><span>Remaining</span><input id="d_remaining" type="number" placeholder="3200"/></label>' +
        '<label class="field"><span>Interest %</span><input id="d_rate" type="number" placeholder="19.99"/></label>' +
        '<label class="field"><span>Monthly pmt</span><input id="d_payment" type="number" placeholder="150"/></label>' +
        '<button class="btn" data-act="addDebt">+ Add</button>' +
      '</div></div>' +
      '<div class="panel"><h3>Your Debts</h3>' + (rows ?
        '<div style="overflow-x:auto"><table><thead><tr><th>Creditor</th><th>Remaining</th><th>Original</th><th>Rate</th><th>Monthly</th><th>Payoff</th><th>Progress</th><th></th></tr></thead><tbody>' + rows + '</tbody></table></div>'
        : '<div class="empty">No debts tracked. 🎉</div>') + '</div>';
  }

  function pageEmergency() {
    var em = state.emergency;
    var target = num(em.monthlyExpenses) * num(em.months);
    var pct = target > 0 ? Math.min(100, num(em.current) / target * 100) : 0;
    var covered = num(em.monthlyExpenses) > 0 ? num(em.current) / num(em.monthlyExpenses) : 0;
    var gauge = [{ name: "saved", value: pct, color: "#2dd4bf" }, { name: "rest", value: 100 - pct, color: "#0f172a" }];

    return '<h1 class="page-title">Emergency Fund</h1><p class="page-sub">A safety net of 3–6 months of expenses is the usual goal.</p>' +
      '<div class="grid2">' +
        '<div class="panel"><h3>Configure</h3>' +
          '<label class="field" style="margin-bottom:14px"><span>Monthly expenses</span><input id="em_exp" type="number" value="' + num(em.monthlyExpenses) + '"/></label>' +
          '<label class="field" style="margin-bottom:14px"><span>Months of cushion: <strong id="em_mlabel">' + em.months + '</strong></span><input id="em_months" type="range" min="1" max="12" value="' + em.months + '"/></label>' +
          '<label class="field"><span>Amount saved</span><input id="em_cur" type="number" value="' + num(em.current) + '"/></label>' +
          '<div class="toolbar" style="margin-top:14px"><button class="btn ghost sm" data-act="em" data-amt="100">+100</button><button class="btn ghost sm" data-act="em" data-amt="500">+500</button></div>' +
        '</div>' +
        '<div class="panel"><h3>Progress</h3><div id="em_gauge">' + donut(gauge, pct.toFixed(0) + "%", "accent") + '</div>' +
          '<div class="cards" style="margin:18px 0 0">' +
            '<div class="card"><div class="label">Saved</div><div class="value" id="em_saved" style="font-size:20px">' + fmt(em.current) + '</div></div>' +
            '<div class="card"><div class="label">Target</div><div class="value" id="em_target" style="font-size:20px">' + fmt(target) + '</div></div>' +
            '<div class="card"><div class="label">Covers</div><div class="value" id="em_covers" style="font-size:20px">' + covered.toFixed(1) + ' mo</div></div>' +
          '</div>' +
        '</div>' +
      '</div>';
  }

  function paintEmergency() {
    var em = state.emergency;
    var target = num(em.monthlyExpenses) * num(em.months);
    var pct = target > 0 ? Math.min(100, num(em.current) / target * 100) : 0;
    var covered = num(em.monthlyExpenses) > 0 ? num(em.current) / num(em.monthlyExpenses) : 0;
    var gauge = [{ name: "saved", value: pct, color: "#2dd4bf" }, { name: "rest", value: 100 - pct, color: "#0f172a" }];
    if (el("em_gauge")) el("em_gauge").innerHTML = donut(gauge, pct.toFixed(0) + "%", "accent");
    if (el("em_saved")) el("em_saved").textContent = fmt(em.current);
    if (el("em_target")) el("em_target").textContent = fmt(target);
    if (el("em_covers")) el("em_covers").textContent = covered.toFixed(1) + " mo";
    if (el("em_mlabel")) el("em_mlabel").textContent = em.months;
  }

  function pageTransactions() {
    var rows = state.transactions.slice().sort(function (a, b) { return (b.date || "").localeCompare(a.date || ""); });
    var f = pageTransactions.filter || "all";
    if (f !== "all") rows = rows.filter(function (t) { return t.type === f; });
    var body = rows.length ? rows.map(function (t) {
      return '<tr><td>' + esc(t.date) + '</td><td><span class="tag ' + t.type + '">' + t.type + '</span></td><td>' + esc(t.category) + '</td>' +
        '<td class="mini">' + esc(t.note) + '</td><td style="text-align:right" class="' + (t.type === "income" ? "pos" : "neg") + '">' + (t.type === "income" ? "+" : "−") + fmt(t.amount) + '</td>' +
        '<td><button class="icon-btn" data-act="delTx" data-id="' + t.id + '">✕</button></td></tr>';
    }).join("") : '';
    var opts = CATEGORIES.map(function (c) { return '<option value="' + c + '">' + c + '</option>'; }).join("");

    return '<h1 class="page-title">Transactions</h1><p class="page-sub">Log income and expenses to keep your balance accurate.</p>' +
      '<div class="panel"><h3>Add Transaction</h3><div class="form-row">' +
        '<label class="field"><span>Date</span><input id="t_date" type="date" value="' + today() + '"/></label>' +
        '<label class="field"><span>Type</span><select id="t_type"><option value="expense">Expense</option><option value="income">Income</option></select></label>' +
        '<label class="field"><span>Category</span><select id="t_cat">' + opts + '</select></label>' +
        '<label class="field"><span>Amount</span><input id="t_amount" type="number" placeholder="0.00"/></label>' +
        '<label class="field"><span>Note (optional)</span><input id="t_note" placeholder="Lunch"/></label>' +
        '<button class="btn" data-act="addTx">+ Add</button>' +
      '</div></div>' +
      '<div class="panel"><h3>History <select id="t_filter" data-act="filter" style="width:140px"><option value="all">All</option><option value="income">Income</option><option value="expense">Expenses</option></select></h3>' +
        (body ? '<div style="overflow-x:auto"><table><thead><tr><th>Date</th><th>Type</th><th>Category</th><th>Note</th><th style="text-align:right">Amount</th><th></th></tr></thead><tbody>' + body + '</tbody></table></div>' : '<div class="empty">No transactions yet.</div>') +
      '</div>';
  }

  function cloudSection() {
    if (!fbAvailable()) {
      return '<div class="panel"><h3>☁ Cloud Sync</h3><div class="hint" style="margin:0">The cloud library couldn\'t load — you may be offline, or opening the file directly. Reconnect to the internet (and ideally host the app online) to enable sync. Your data is safe locally in the meantime.</div></div>';
    }
    var cfg = getCfg();
    if (!cfg) {
      return '<div class="panel"><h3>☁ Cloud Sync — Step 1: Connect Firebase</h3>' +
        '<p class="mini" style="margin:-6px 0 12px">Paste your Firebase <strong>config object</strong> below (one-time). Setup steps are in the guide I gave you.</p>' +
        '<textarea id="fb_cfg" style="width:100%;min-height:140px;background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:12px;font-family:monospace;font-size:13px" placeholder=\'{\n  apiKey: "...",\n  authDomain: "...",\n  projectId: "...",\n  ...\n}\'></textarea>' +
        '<div class="toolbar" style="margin-top:12px"><button class="btn" data-act="saveCfg">Connect</button></div></div>';
    }
    if (!cloud.user) {
      return '<div class="panel"><h3>☁ Cloud Sync — Step 2: Sign In</h3>' +
        '<p class="mini" style="margin:-6px 0 12px">Sign in with the <strong>same Google account</strong> on every device to share your data. (Works once the app is hosted online — see the guide.)</p>' +
        '<div class="toolbar" style="margin-top:12px"><button class="btn" data-act="signInGoogle">Sign in with Google</button><button class="btn ghost" data-act="editCfg">Change Firebase config</button></div></div>';
    }
    return '<div class="panel"><h3>☁ Cloud Sync — Active</h3>' +
      '<div class="hint" style="margin:0 0 12px">✓ Synced as <strong>' + esc(cloud.user.email) + '</strong>. Changes save to the cloud automatically and appear on your other signed-in devices.</div>' +
      '<div class="toolbar"><button class="btn ghost" data-act="signOut">Sign out</button></div></div>';
  }

  function pageData() {
    var cur = state.currency || "$";
    var currencies = ["$","€","£","₫","¥","₹"].map(function (c) { return '<button class="btn ' + (cur === c ? "" : "ghost") + ' sm" data-act="cur" data-c="' + c + '">' + c + '</button>'; }).join("");
    return '<h1 class="page-title">Backup, Export & Sync</h1><p class="page-sub">Sync across devices, or move data manually.</p>' +
      cloudSection() +
      '<div class="panel"><h3>Currency</h3><div class="toolbar">' + currencies + '</div></div>' +
      '<div class="panel"><h3>Export</h3><div class="toolbar"><button class="btn" data-act="expJSON">⤓ Backup (JSON)</button><button class="btn ghost" data-act="expCSV">⤓ Transactions (CSV)</button></div></div>' +
      '<div class="panel"><h3>Import / Restore</h3><div class="toolbar"><button class="btn ghost" data-act="impClick">⤒ Import JSON backup</button><input id="impFile" type="file" accept="application/json" style="display:none"/></div><p class="mini" style="margin-top:10px">Importing merges the backup into your current data.</p></div>' +
      '<div class="panel"><h3>Danger Zone</h3><button class="btn ghost" style="border-color:var(--red);color:var(--red)" data-act="clear">Erase all data</button></div>' +
      '<div id="dataMsg"></div>';
  }

  /* ---------- actions ---------- */
  function download(filename, text, type) {
    var blob = new Blob([text], { type: type || "text/plain" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = filename; document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
  }

  var actions = {
    setOB: function () { state.openingBalance = num(val("ob_input")); save(); render(); },
    addGoal: function () {
      var name = val("g_name"); if (!name || !val("g_target")) return;
      state.goals.push({ id: uid(), name: name, target: num(val("g_target")), current: num(val("g_current")), deadline: val("g_deadline") || "" });
      save(); render();
    },
    delGoal: function (e) { state.goals = state.goals.filter(function (g) { return g.id !== e.id; }); save(); render(); },
    goal: function (e) { state.goals.forEach(function (g) { if (g.id === e.id) g.current = Math.max(0, num(g.current) + num(e.amt)); }); save(); render(); },
    addDebt: function () {
      var c = val("d_creditor"); if (!c || !val("d_remaining")) return;
      state.debts.push({ id: uid(), creditor: c, total: num(val("d_total") || val("d_remaining")), remaining: num(val("d_remaining")), rate: num(val("d_rate")), payment: num(val("d_payment")) });
      save(); render();
    },
    delDebt: function (e) { state.debts = state.debts.filter(function (d) { return d.id !== e.id; }); save(); render(); },
    addTx: function () {
      if (!val("t_amount")) return;
      state.transactions.push({ id: uid(), date: val("t_date") || today(), type: val("t_type"), category: val("t_cat"), amount: num(val("t_amount")), note: val("t_note") });
      save(); render();
    },
    delTx: function (e) { state.transactions = state.transactions.filter(function (t) { return t.id !== e.id; }); save(); render(); },
    em: function (e) { state.emergency.current = num(state.emergency.current) + num(e.amt); save(); paintEmergency(); if (el("em_cur")) el("em_cur").value = num(state.emergency.current); },
    cur: function (e) { state.currency = e.c; save(); render(); },
    expJSON: function () { download("finance-backup-" + today() + ".json", JSON.stringify(state, null, 2), "application/json"); },
    expCSV: function () {
      var head = "Date,Type,Category,Amount,Note\n";
      var body = state.transactions.map(function (t) { return [t.date, t.type, t.category, t.amount, '"' + String(t.note || "").replace(/"/g, '""') + '"'].join(","); }).join("\n");
      download("transactions-" + today() + ".csv", head + body, "text/csv");
    },
    saveCfg: function () {
      var raw = val("fb_cfg") || ""; var s = raw.indexOf("{"), e = raw.lastIndexOf("}");
      if (s < 0 || e < 0) { msg("Paste your firebaseConfig object (the part with { ... })."); return; }
      try {
        var obj = (new Function("return (" + raw.slice(s, e + 1) + ")"))();
        if (!obj || !obj.apiKey || !obj.projectId) { msg("That config is missing apiKey or projectId."); return; }
        localStorage.setItem("fb_config", JSON.stringify(obj));
        initCloud(); render();
      } catch (err) { msg("Could not read that config: " + err.message); }
    },
    signInGoogle: function () {
      if (!initCloud()) { msg("Cloud not ready."); return; }
      var provider = new firebase.auth.GoogleAuthProvider();
      cloud.auth.signInWithPopup(provider).catch(function (e) {
        if (e.code === "auth/popup-blocked" || e.code === "auth/cancelled-popup-request" || e.code === "auth/operation-not-supported-in-this-environment") {
          cloud.auth.signInWithRedirect(provider);
        } else { msg(e.message); }
      });
    },
    signOut: function () { if (cloud.auth) cloud.auth.signOut(); },
    editCfg: function () { localStorage.removeItem("fb_config"); location.reload(); },
    impClick: function () { if (el("impFile")) el("impFile").click(); },
    clear: function () { if (confirm("Erase ALL data on this device? Export a backup first if unsure.")) { state = clone(defaultData); save(); render(); } }
  };

  function render() {
    var pages = { dashboard: pageDashboard, goals: pageGoals, debt: pageDebt, emergency: pageEmergency, transactions: pageTransactions, data: pageData };
    var nav = [
      { id: "dashboard", label: "Dashboard", ico: "▥" },
      { id: "goals", label: "Goals", ico: "◎" },
      { id: "debt", label: "Debt", ico: "◍" },
      { id: "emergency", label: "Emergency Fund", ico: "⛨" },
      { id: "transactions", label: "Transactions", ico: "⇄" },
      { id: "data", label: "Backup / Export", ico: "⤓" }
    ];
    var sidebar = '<aside class="sidebar"><div class="brand"><span class="dot"></span> Finance</div><nav class="nav">' +
      nav.map(function (n) { return '<button class="' + (currentTab === n.id ? "active" : "") + '" data-tab="' + n.id + '"><span class="ico">' + n.ico + '</span> <span class="label">' + n.label + '</span></button>'; }).join("") +
      '</nav></aside>';
    el("root").innerHTML = '<div class="app">' + sidebar + '<main class="main">' + pages[currentTab]() + '</main></div>';
    wire();
  }

  function wire() {
    var root = el("root");
    root.querySelectorAll("[data-tab]").forEach(function (b) { b.onclick = function () { currentTab = b.getAttribute("data-tab"); render(); }; });
    root.querySelectorAll("[data-act]").forEach(function (b) {
      var act = b.getAttribute("data-act");
      if (act === "filter") { b.value = pageTransactions.filter || "all"; b.onchange = function () { pageTransactions.filter = b.value; render(); }; return; }
      if (actions[act]) b.onclick = function () { actions[act]({ id: b.getAttribute("data-id"), amt: b.getAttribute("data-amt"), c: b.getAttribute("data-c") }); };
    });
    if (el("impFile")) el("impFile").onchange = function (ev) {
      var file = ev.target.files[0]; if (!file) return;
      var reader = new FileReader();
      reader.onload = function (e) {
        try { var obj = JSON.parse(e.target.result); state = Object.assign(clone(defaultData), obj); save(); render(); el("dataMsg").innerHTML = '<div class="hint">✓ Data restored successfully.</div>'; }
        catch (err) { if (el("dataMsg")) el("dataMsg").innerHTML = '<div class="hint" style="color:#fca5a5">✕ Could not read that file.</div>'; }
      };
      reader.readAsText(file);
    };
    // emergency live inputs
    if (el("em_exp")) el("em_exp").oninput = function () { state.emergency.monthlyExpenses = num(this.value); save(); paintEmergency(); };
    if (el("em_cur")) el("em_cur").oninput = function () { state.emergency.current = num(this.value); save(); paintEmergency(); };
    if (el("em_months")) el("em_months").oninput = function () { state.emergency.months = num(this.value); save(); paintEmergency(); };
  }

  // boot
  try {
    state = load();
    render();
    initCloud(); // reconnects automatically if you've set up sync before
  } catch (err) {
    document.getElementById("root").innerHTML = '<div style="padding:40px;color:#f87171;font-family:monospace">Error: ' + esc(err.message) + '</div>';
  }
})();
</script>
</body>
</html>
