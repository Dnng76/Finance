<style>
  :root {
    --bg: #0b1120; --bg2: #0f172a; --panel: #1e293b; --panel2: #273449;
    --border: #334155; --text: #e2e8f0; --muted: #94a3b8;
    --accent: #2dd4bf; --accent2: #38bdf8;
    --green: #34d399; --red: #f87171; --yellow: #fbbf24; --purple: #a78bfa;
  }
  body.light {
    --bg: #f1f5f9; --bg2: #ffffff; --panel: #ffffff; --panel2: #e2e8f0;
    --border: #cbd5e1; --text: #0f172a; --muted: #64748b;
    --accent: #0d9488; --accent2: #0284c7;
    --green: #16a34a; --red: #dc2626; --yellow: #d97706; --purple: #7c3aed;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }

  .app { display: flex; min-height: 100vh; }
  .sidebar { width: 240px; background: var(--bg2); border-right: 1px solid var(--border); padding: 24px 16px; position: sticky; top: 0; height: 100vh; flex-shrink: 0; }
  .brand { display: flex; align-items: center; gap: 10px; font-size: 20px; font-weight: 700; margin-bottom: 28px; padding: 0 8px; }
  .brand .dot { width: 12px; height: 12px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 12px var(--accent); }
  .nav button { display: flex; align-items: center; gap: 12px; width: 100%; text-align: left; background: transparent; border: none; color: var(--muted); padding: 12px 14px; border-radius: 10px; font-size: 15px; cursor: pointer; margin-bottom: 4px; transition: all .15s; }
  .nav button:hover { background: var(--panel); color: var(--text); }
  .nav button.active { background: linear-gradient(90deg, rgba(45,212,191,.18), rgba(56,189,248,.08)); color: var(--accent); font-weight: 600; }
  .nav button .ico { font-size: 18px; width: 22px; text-align: center; }

  .main { flex: 1; padding: 32px 40px; max-width: 1200px; }
  @media (max-width: 760px) {
    .app { flex-direction: column; }
    .sidebar { width: 100%; height: auto; position: static; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .brand { margin-bottom: 0; margin-right: auto; }
    .nav { display: flex; flex-wrap: wrap; gap: 4px; }
    .nav button { width: auto; padding: 8px 12px; }
    .nav button .label { display: none; }
    .nav button .ico { font-size: 20px; }
    .main { padding: 20px 16px; }
  }
  .page-title { font-size: 26px; font-weight: 700; margin: 0 0 4px; }
  .page-sub { color: var(--muted); margin: 0 0 28px; font-size: 14px; }

  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 18px; margin-bottom: 28px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 22px; }
  .card .label { color: var(--muted); font-size: 13px; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }
  .card .value { font-size: 26px; font-weight: 700; word-break: break-word; }
  .card .sub { font-size: 13px; color: var(--muted); margin-top: 6px; }
  .pos { color: var(--green); } .neg { color: var(--red); }

  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 22px; margin-bottom: 22px; }
  .panel h3 { margin: 0 0 18px; font-size: 17px; display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap: wrap; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
  @media (max-width: 900px) { .grid2 { grid-template-columns: 1fr; } }

  input, select { background: var(--bg2); border: 1px solid var(--border); color: var(--text); padding: 10px 12px; border-radius: 10px; font-size: 14px; width: 100%; outline: none; font-family: inherit; }
  input:focus, select:focus { border-color: var(--accent); }
  label.field { display: block; }
  label.field span { display:block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .form-row { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); align-items: end; }

  button.btn { background: var(--accent); color: #04231f; border: none; padding: 11px 18px; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 14px; white-space: nowrap; font-family: inherit; }
  button.btn:hover { filter: brightness(1.08); }
  button.btn.ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
  button.btn.ghost:hover { background: var(--panel2); }
  button.btn.sm { padding: 7px 12px; font-size: 13px; }
  button.icon-btn { background: transparent; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 4px 8px; border-radius: 8px; }
  button.icon-btn:hover { color: var(--red); background: rgba(248,113,113,.1); }

  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: .4px; padding: 10px 12px; border-bottom: 1px solid var(--border); }
  td { padding: 12px; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  .tag { padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
  .tag.income { background: rgba(52,211,153,.15); color: var(--green); }
  .tag.expense { background: rgba(248,113,113,.15); color: var(--red); }

  .progress { height: 10px; background: var(--bg2); border-radius: 999px; overflow: hidden; }
  .progress > div { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width .4s; }

  .goal { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 18px; }
  .empty { color: var(--muted); text-align: center; padding: 30px; font-size: 14px; }
  .row-between { display:flex; align-items:center; justify-content: space-between; gap: 12px; }
  .mini { font-size: 12px; color: var(--muted); }
  .toolbar { display:flex; gap: 10px; flex-wrap: wrap; align-items:center; }
  .hint { background: rgba(56,189,248,.08); border: 1px solid rgba(56,189,248,.25); color: #bae6fd; padding: 12px 16px; border-radius: 12px; font-size: 13px; margin-bottom: 22px; }
  .legend { list-style: none; padding: 0; margin: 12px 0 0; }
  .legend li { display: flex; align-items: center; gap: 10px; font-size: 13px; padding: 5px 0; }
  .legend .sw { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
  .legend .amt { margin-left: auto; color: var(--muted); }
  .chart-wrap { width: 100%; }
</style>
</head>

  function payoffMonths(remaining, annualRate, payment) {

    if (payment <= 0) return Infinity;
    if (r === 0) return Math.ceil(remaining / payment);
    if (payment <= remaining * r) return Infinity;
    return Math.ceil(-Math.log(1 - (r * remaining) / payment) / Math.log(1 + r));
  }

  function simulateDebts(strategy, extra) {
    var list = state.debts.map(function (d) {
      return { remaining: num(d.remaining), rate: num(d.rate) / 100 / 12, min: num(d.payment), creditor: d.creditor };
    }).filter(function (d) { return d.remaining > 0; });
    if (!list.length) return { months: 0, interest: 0, order: [] };
    var months = 0, interest = 0, order = [], guard = 0;
    while (list.some(function (d) { return d.remaining > 0.005; }) && guard < 1200) {
      guard++; months++;
      list.forEach(function (d) { if (d.remaining > 0) { var i = d.remaining * d.rate; d.remaining += i; interest += i; } });
      var pool = num(extra);
      list.forEach(function (d) { if (d.remaining > 0) { var m = Math.min(d.min, d.remaining); d.remaining -= m; if (d.min > m) pool += (d.min - m); } });
      var active = list.filter(function (d) { return d.remaining > 0.005; });
      active.sort(function (a, b) { return strategy === "avalanche" ? b.rate - a.rate : a.remaining - b.remaining; });
      for (var k = 0; k < active.length && pool > 0.005; k++) {
        var pay = Math.min(pool, active[k].remaining);
        active[k].remaining -= pay; pool -= pay;
      }
      list.forEach(function (d) { if (d.remaining <= 0.005 && order.indexOf(d.creditor) < 0) order.push(d.creditor); });
    }
    return { months: guard >= 1200 ? Infinity : months, interest: interest, order: order };
  }

  function ensureGoalBuckets(g) {

  }

  function goalGift(g) { return num(g.giftSaved); }

  function goalTimeframe(g) {
    if (!g.deadline) return "";
    var remaining = num(g.target) - num(g.current);
    var dl = new Date(g.deadline + "T00:00:00");
    var label = dl.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
    var days = Math.round((dl.getTime() - new Date(today() + "T00:00:00").getTime()) / 86400000);
    if (remaining <= 0) return '<div class="mini" style="margin-top:8px;color:var(--green)">✓ Reached — target ' + label + '</div>';
    if (days < 0) return '<div class="mini" style="margin-top:8px;color:var(--red)">⚠ Past due (' + label + ') · ' + fmt(remaining) + ' to go</div>';
    if (days <= 31) return '<div class="mini" style="margin-top:8px">🎯 ' + label + ' · ' + days + ' day' + (days === 1 ? "" : "s") + ' left · ' + fmt(remaining) + ' to go</div>';
    var months = days / 30.44;
    return '<div class="mini" style="margin-top:8px">🎯 ' + label + ' · ' + Math.round(months) + ' mo (' + days + ' days) left · save <strong>' + fmt(remaining / months) + '</strong>/mo</div>';

    save();

  function pageEmergency() {

  function catCard(name, amount, maxv) {

      '</div>';

  function categorySummary() {
    var exp = {}, inc = {};
    state.transactions.forEach(function (t) { var bucket = t.type === "income" ? inc : exp; var c = t.category || "Other"; bucket[c] = (bucket[c] || 0) + num(t.amount); });
    var ek = Object.keys(exp), ik = Object.keys(inc);
    if (!ek.length && !ik.length) return "";
    var t = totals();
    var stat = function (label, value, cls) { return '<div><div class="mini">' + label + '</div><div style="font-size:22px;font-weight:700" class="' + (cls || "") + '">' + value + '</div></div>'; };

      stat("Income", fmt(t.income), "pos") + stat("Expense", fmt(t.expense), "neg") +

      stat("Balance", fmt(t.balance), t.balance >= 0 ? "pos" : "neg") + '</div>';
    var flex = "display:flex;flex-wrap:wrap;gap:14px";
    var html = summary;
    if (ek.length) {
      var et = ek.reduce(function (s, k) { return s + exp[k]; }, 0), em = Math.max.apply(null, ek.map(function (k) { return exp[k]; }));

  function pageTrading() {

    var net = profit - loss;
    var balance = num(tr.startBalance) + net;
    var total = wins + losses;
    var winRate = total > 0 ? wins / total * 100 : 0;

    var sorted = tr.trades.slice().sort(function (a, b) { return (a.date || "").localeCompare(b.date || ""); });
    var running = num(tr.startBalance), map = {};
    sorted.forEach(function (t) { running += t.result === "loss" ? -num(t.amount) : num(t.amount); map[t.date] = running; });
    var series = Object.keys(map).sort().map(function (d) { return { date: d, balance: map[d] }; });

    var rows = tr.trades.slice().sort(function (a, b) { return (b.date || "").localeCompare(a.date || ""); }).map(function (t) {
      if (editTradeId === t.id) {
        return '<tr>' +

          '<td><input id="etr_amount" type="number" value="' + num(t.amount) + '" style="width:100px;text-align:right"/></td>' +
          '<td><input id="etr_note" value="' + esc(t.note || "") + '" style="min-width:110px"/></td>' +
          '<td style="white-space:nowrap"><button class="btn sm" data-act="editTradeSave" data-id="' + t.id + '">Save</button> <button class="icon-btn" data-act="editTradeCancel">✕</button></td></tr>';
      }
      var isLoss = t.result === "loss";
      return '<tr><td>' + esc(t.date) + '</td><td><strong>' + esc(t.symbol || "—") + '</strong></td>' +
        '<td><span class="tag ' + (isLoss ? "expense" : "income") + '">' + t.result + '</span></td>' +
        '<td style="text-align:right" class="' + (isLoss ? "neg" : "pos") + '">' + (isLoss ? "−" : "+") + fmt(t.amount) + '</td>' +
        '<td class="mini">' + esc(t.note) + '</td>' +
        '<td style="white-space:nowrap"><button class="icon-btn" data-act="editTrade" data-id="' + t.id + '">✎</button><button class="icon-btn" data-act="delTrade" data-id="' + t.id + '">✕</button></td></tr>';
    }).join("");

    var winsArr = tr.trades.filter(function (t) { return t.result !== "loss"; }).map(function (t) { return num(t.amount); });
    var lossArr = tr.trades.filter(function (t) { return t.result === "loss"; }).map(function (t) { return num(t.amount); });
    var avgWin = winsArr.length ? profit / winsArr.length : 0;
    var avgLoss = lossArr.length ? loss / lossArr.length : 0;
    var bigWin = winsArr.length ? Math.max.apply(null, winsArr) : 0;
    var bigLoss = lossArr.length ? Math.max.apply(null, lossArr) : 0;
    var profitFactor = loss > 0 ? profit / loss : (profit > 0 ? Infinity : 0);
    var byDate = tr.trades.slice().sort(function (a, b) { return (b.date || "").localeCompare(a.date || ""); });
    var streak = 0, streakType = "";
    for (var si = 0; si < byDate.length; si++) {
      var rr = byDate[si].result === "loss" ? "loss" : "win";
      if (si === 0) { streakType = rr; streak = 1; } else if (rr === streakType) { streak++; } else break;
    }
    var streakLabel = streak ? streak + " " + (streakType === "win" ? "win" + (streak !== 1 ? "s" : "") : "loss" + (streak !== 1 ? "es" : "")) : "—";
    var statsPanel = tr.trades.length ? '<div class="panel"><h3>Performance</h3><div class="cards" style="margin:0">' +
      card("Avg Win", fmt(avgWin), "", "pos") +
      card("Avg Loss", fmt(avgLoss), "", "neg") +
      card("Biggest Win", fmt(bigWin), "", "pos") +
      card("Biggest Loss", fmt(bigLoss), "", "neg") +
      card("Profit Factor", profitFactor === Infinity ? "∞" : profitFactor.toFixed(2), "Profit ÷ Loss", profitFactor >= 1 ? "pos" : "neg") +
      card("Current Streak", streakLabel, "", streakType === "win" ? "pos" : (streakType === "loss" ? "neg" : "")) +
      '</div></div>' : "";

    var symMap = {};
    tr.trades.forEach(function (t) { var s = t.symbol || "—"; if (!symMap[s]) symMap[s] = { net: 0, n: 0 }; symMap[s].net += (t.result === "loss" ? -num(t.amount) : num(t.amount)); symMap[s].n++; });
    var symRows = Object.keys(symMap).sort(function (a, b) { return symMap[b].net - symMap[a].net; }).map(function (s) {
      var o = symMap[s];
      return '<tr><td><strong>' + esc(s) + '</strong></td><td>' + o.n + '</td><td style="text-align:right" class="' + (o.net >= 0 ? "pos" : "neg") + '">' + (o.net >= 0 ? "+" : "−") + fmt(Math.abs(o.net)) + '</td></tr>';
    }).join("");
    var symPanel = tr.trades.length ? '<div class="panel"><h3>By Symbol</h3><div style="overflow-x:auto"><table><thead><tr><th>Symbol</th><th>Trades</th><th style="text-align:right">Net P/L</th></tr></thead><tbody>' + symRows + '</tbody></table></div></div>' : "";

    return '<h1 class="page-title">Trading</h1><p class="page-sub">Log your trades and track profit, loss, and balance.</p>' +
      '<div class="panel"><h3>Trading Capital</h3>' +
        '<p class="mini" style="margin:-8px 0 14px">Your starting trading balance. Profits and losses below adjust it.</p>' +
        '<div class="form-row" style="max-width:420px">' +
          '<label class="field"><span>Starting capital (' + (state.currency || "$") + ')</span><input id="tr_start" type="number" value="' + num(tr.startBalance) + '"/></label>' +
          '<button class="btn" data-act="setTradeStart">Save</button>' +
        '</div></div>' +
      '<div class="cards">' +
        card("Trading Balance", fmt(balance), "Capital " + fmt(tr.startBalance) + " + P/L", balance >= num(tr.startBalance) ? "pos" : "neg") +
        card("Net P/L", (net >= 0 ? "+" : "−") + fmt(Math.abs(net)), tr.trades.length + " trade" + (tr.trades.length !== 1 ? "s" : ""), net >= 0 ? "pos" : "neg") +
        card("Total Profit", fmt(profit), wins + " win" + (wins !== 1 ? "s" : ""), "pos") +
        card("Total Loss", fmt(loss), losses + " loss" + (losses !== 1 ? "es" : ""), "neg") +
        card("Win Rate", winRate.toFixed(0) + "%", wins + " / " + total + " trades", "") +
      '</div>' + statsPanel +
      '<div class="panel"><h3>Add a Trade</h3><div class="form-row">' +
        '<label class="field"><span>Date</span><input id="tr_date" type="date" value="' + today() + '"/></label>' +
        '<label class="field"><span>Symbol</span><input id="tr_symbol" placeholder="BTC, AAPL…"/></label>' +
        '<label class="field"><span>Result</span><select id="tr_result"><option value="profit">Profit</option><option value="loss">Loss</option></select></label>' +
        '<label class="field"><span>Amount</span><input id="tr_amount" type="number" placeholder="0.00"/></label>' +
        '<label class="field"><span>Note (optional)</span><input id="tr_note" placeholder="Scalp, swing…"/></label>' +
        '<button class="btn" data-act="addTrade">+ Add</button>' +
      '</div></div>' +
      '<div class="panel"><h3>Balance Over Time</h3>' + areaChart(series) + '</div>' +
      '<div class="panel"><h3>Trade History</h3>' + (rows ?
        '<div style="overflow-x:auto"><table><thead><tr><th>Date</th><th>Symbol</th><th>Result</th><th style="text-align:right">Amount</th><th>Note</th><th></th></tr></thead><tbody>' + rows + '</tbody></table></div>'
        : '<div class="empty">No trades logged yet.</div>') + '</div>' + symPanel;
  }

  function pageCompound() {
    if (pageCompound.p == null) { pageCompound.p = 1000; pageCompound.m = 100; pageCompound.r = 7; pageCompound.y = 10; }
    var P = num(pageCompound.p), PMT = num(pageCompound.m), rate = num(pageCompound.r), years = num(pageCompound.y);
    var r = rate / 100 / 12, months = Math.round(years * 12);
    var series = [], bal = P, fv;
    if (months > 0) {
      for (var i = 1; i <= months; i++) { bal = bal * (1 + r) + PMT; if (i % 12 === 0 || i === months) series.push({ date: "Y" + Math.ceil(i / 12), balance: bal }); }
      fv = bal;
    } else { fv = P; series = [{ date: "Y0", balance: P }]; }
    var contrib = P + PMT * months;
    var interest = fv - contrib;
    var cur = state.currency || "$";

    return '<h1 class="page-title">Compound Interest</h1><p class="page-sub">See how your money can grow over time.</p>' +
      '<div class="panel"><h3>Inputs</h3><div class="form-row">' +
        '<label class="field"><span>Starting amount (' + cur + ')</span><input id="ci_p" type="number" value="' + P + '"/></label>' +

        '<label class="field"><span>Annual interest rate %</span><input id="ci_r" type="number" value="' + rate + '"/></label>' +
        '<label class="field"><span>Years</span><input id="ci_y" type="number" value="' + years + '"/></label>' +
        '<button class="btn" data-act="calcCompound">Calculate</button>' +
      '</div><p class="mini" style="margin-top:10px">Assumes interest compounds monthly and contributions are added each month.</p></div>' +
      '<div class="cards">' +
        card("Future Value", fmt(fv), "After " + years + " year" + (years === 1 ? "" : "s"), "pos") +
        card("Total Contributions", fmt(contrib), "What you put in", "") +
        card("Interest Earned", fmt(interest), "Growth from compounding", "pos") +
        card("Growth", contrib > 0 ? (fv / contrib).toFixed(2) + "×" : "—", "Value ÷ contributions", "") +
      '</div>' +
      '<div class="panel"><h3>Projected Growth</h3>' + areaChart(series) + '</div>';
  }

  function securitySection() {
    if (!state.pin) {
      return '<div class="panel"><h3>🔒 App Lock (PIN)</h3>' +
        '<p class="mini" style="margin:-8px 0 12px">Set a numeric PIN to lock the app on open. Casual privacy lock — not bank-grade security.</p>' +
        '<div class="form-row" style="max-width:360px"><label class="field"><span>New PIN (4+ digits)</span><input id="sp_pin" type="password" inputmode="numeric" placeholder="••••"/></label><button class="btn" data-act="setPin">Set PIN</button></div></div>';
    }
    return '<div class="panel"><h3>🔒 App Lock (PIN)</h3><div class="hint" style="margin:0 0 12px">✓ PIN lock is on — you\'ll be asked for it when the app opens. Forgot it? Tap <strong>“Forgot PIN? Reset with Google”</strong> on the lock screen to reset using your Google account.</div>' +
      '<div class="toolbar"><button class="btn" data-act="lockNow">Lock now</button><button class="btn ghost" data-act="removePin">Remove PIN</button></div></div>';
  }

  function cloudSection() {
    if (!fbAvailable()) {
      return '<div class="panel"><h3>☁ Cloud Sync</h3><div class="hint" style="margin:0">The cloud library couldn\'t load — you may be offline, or opening the file directly. Reconnect to the internet (and ideally host the app online) to enable sync. Your data is safe locally in the meantime.</div></div>';
    }
    var cfg = getCfg();
    if (!cfg) {
      return '<div class="panel"><h3>☁ Cloud Sync — Step 1: Connect Firebase</h3>' +
        '<p class="mini" style="margin:-6px 0 12px">Paste your Firebase <strong>config object</strong> below (one-time). Setup steps are in the guide I gave you.</p>' +
        '<textarea id="fb_cfg" style="width:100%;min-height:140px;background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:12px;font-family:monospace;font-size:13px" placeholder=\'{\n  apiKey: "...",\n  authDomain: "...",\n  projectId: "...",\n  ...\n}\'></textarea>' +
        '<div class="toolbar" style="margin-top:12px"><button class="btn" data-act="saveCfg">Connect</button></div></div>';
    }
    if (!cloud.user) {
      return '<div class="panel"><h3>☁ Cloud Sync — Step 2: Sign In</h3>' +
        '<p class="mini" style="margin:-6px 0 12px">Sign in with the <strong>same Google account</strong> on every device to share your data. (Works once the app is hosted online — see the guide.)</p>' +
        '<div class="toolbar" style="margin-top:12px"><button class="btn" data-act="signInGoogle">Sign in with Google</button><button class="btn ghost" data-act="editCfg">Change Firebase config</button></div></div>';
    }
    return '<div class="panel"><h3>☁ Cloud Sync — Active</h3>' +
      '<div class="hint" style="margin:0 0 12px">✓ Synced as <strong>' + esc(cloud.user.email) + '</strong>. Changes save to the cloud automatically and appear on your other signed-in devices.</div>' +
      '<div class="toolbar"><button class="btn ghost" data-act="signOut">Sign out</button></div></div>';
  }

  function pageData() {
    var cur = state.currency || "$";
    var currencies = ["$","€","£","₫","¥","₹"].map(function (c) { return '<button class="btn ' + (cur === c ? "" : "ghost") + ' sm" data-act="cur" data-c="' + c + '">' + c + '</button>'; }).join("");
    return '<h1 class="page-title">Backup, Export & Sync</h1><p class="page-sub">Sync across devices, or move data manually.</p>' +
      cloudSection() + securitySection() + tabOrderPanel() +
      '<div class="panel"><h3>Currency</h3><div class="toolbar">' + currencies + '</div></div>' +
      '<div class="panel"><h3>Export</h3><div class="toolbar"><button class="btn" data-act="expJSON">⤓ Backup (JSON)</button><button class="btn ghost" data-act="expCSV">⤓ Transactions (CSV)</button></div></div>' +
      '<div class="panel"><h3>Import / Restore</h3><div class="toolbar"><button class="btn ghost" data-act="impClick">⤒ Import JSON backup</button><input id="impFile" type="file" accept="application/json" style="display:none"/></div><p class="mini" style="margin-top:10px">Importing merges the backup into your current data.</p></div>' +
      '<div class="panel"><h3>Danger Zone</h3><button class="btn ghost" style="border-color:var(--red);color:var(--red)" data-act="clear">Erase all data</button></div>' +
      '<div id="dataMsg"></div>';
  }

  /* ---------- actions ---------- */
  function download(filename, text, type) {
    var blob = new Blob([text], { type: type || "text/plain" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = filename; document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
  }

  var actions = {
    setOB: function () { state.openingBalance = num(val("ob_input")); save(); render(); },
    setTradeStart: function () { state.trading.startBalance = num(val("tr_start")); save(); render(); },
    setPayday: function () { state.payday = { label: val("pd_label") || "Payday", date: val("pd_date") || "", amount: num(val("pd_amount")) }; save(); render(); },
    calcCompound: function () { pageCompound.p = num(val("ci_p")); pageCompound.m = num(val("ci_m")); pageCompound.r = num(val("ci_r")); pageCompound.y = num(val("ci_y")); render(); },
    privacy: function () { privacy = !privacy; try { localStorage.setItem("ft_privacy", privacy ? "1" : "0"); } catch (e) {} render(); },
    theme: function () { theme = theme === "light" ? "dark" : "light"; try { localStorage.setItem("ft_theme", theme); } catch (e) {} applyTheme(); render(); },
    setPin: function () { var v = (val("sp_pin") || "").replace(/\D/g, ""); if (v.length < 4) { msg("PIN must be at least 4 digits."); return; } state.pin = v; save(); render(); },
    removePin: function () { state.pin = ""; locked = false; save(); render(); },
    lockNow: function () { if (state.pin) { locked = true; pinBuffer = ""; pinError = false; render(); } },
    pinDigit: function (e) {
      pinError = false; pinBuffer += e.k;
      if (pinBuffer.length >= state.pin.length) {
        if (pinBuffer === state.pin) { locked = false; pinBuffer = ""; } else { pinBuffer = ""; pinError = true; }
      }
      render();
    },
    pinDel: function () { pinBuffer = pinBuffer.slice(0, -1); render(); },
    forgotPin: function () {
      var note = function (t) { if (el("pinMsg")) el("pinMsg").textContent = t; };
      if (location.protocol === "file:") { note("Reset only works on the hosted app (your github.io link), not the local file. Open the app online to reset."); return; }
      if (!fbAvailable()) { note("You appear to be offline. Connect to the internet and try again."); return; }
      if (!initCloud()) { note("Cloud not available — try again online."); return; }
      note("Opening Google sign-in…");
      var provider = new firebase.auth.GoogleAuthProvider();
      provider.setCustomParameters({ prompt: "select_account" });
      cloud.auth.signInWithPopup(provider).then(function () {
        state.pin = ""; pinBuffer = ""; pinError = false; locked = false; save(); render();
      }).catch(function (e) {
        if (e && e.code === "auth/popup-closed-by-user") { note("Sign-in cancelled. Tap to try again."); return; }
        try { localStorage.setItem("ft_resetpin", "1"); } catch (err) {}
        cloud.auth.signInWithRedirect(provider).catch(function () { note("Couldn't open Google sign-in. Use the hosted app online to reset."); });
      });
    },
    calcDebt: function () { pageDebt.extra = num(val("sn_extra")); render(); },
    addTrade: function () {
      if (!val("tr_amount")) return;
      state.trading.trades.push({ id: uid(), date: val("tr_date") || today(), symbol: val("tr_symbol"), result: val("tr_result"), amount: num(val("tr_amount")), note: val("tr_note") });
      save(); render();
    },
    delTrade: function (e) { state.trading.trades = state.trading.trades.filter(function (t) { return t.id !== e.id; }); save(); render(); },
    addGoal: function () {
      var name = val("g_name"); if (!name || !val("g_target")) return;
      var cash = num(val("g_current")), gift = num(val("g_gift"));
      state.goals.push({ id: uid(), name: name, target: num(val("g_target")), cashSaved: cash, giftSaved: gift, current: cash + gift, deadline: val("g_deadline") || "" });
      save(); render();
    },
    delGoal: function (e) { state.goals = state.goals.filter(function (g) { return g.id !== e.id; }); save(); render(); },
    editGoal: function (e) { editGoalId = e.id; render(); },
    editGoalCancel: function () { editGoalId = null; render(); },
    editGoalSave: function (e) {
      state.goals.forEach(function (g) {
        if (g.id === e.id) { g.name = val("eg_name") || g.name; g.target = num(val("eg_target")); g.cashSaved = num(val("eg_cash")); g.giftSaved = num(val("eg_gift")); g.current = g.cashSaved + g.giftSaved; g.deadline = val("eg_deadline") || ""; }
      });
      editGoalId = null; save(); render();
    },
    goal: function (e) { state.goals.forEach(function (g) { if (g.id === e.id) { ensureGoalBuckets(g); g.cashSaved = Math.max(0, g.cashSaved + num(e.amt)); g.current = g.cashSaved + g.giftSaved; } }); save(); render(); },
    goalAdd: function (e) {
      var a = num(val("gadd_" + e.id)); if (!a) return; var src = val("gsrc_" + e.id);
      state.goals.forEach(function (g) { if (g.id === e.id) { ensureGoalBuckets(g); if (src === "gift") g.giftSaved += a; else g.cashSaved += a; g.current = g.cashSaved + g.giftSaved; } });
      save(); render();
    },
    goalSub: function (e) {
      var a = num(val("gadd_" + e.id)); if (!a) return; var src = val("gsrc_" + e.id);
      state.goals.forEach(function (g) { if (g.id === e.id) { ensureGoalBuckets(g); if (src === "gift") g.giftSaved = Math.max(0, g.giftSaved - a); else g.cashSaved = Math.max(0, g.cashSaved - a); g.current = g.cashSaved + g.giftSaved; } });
      save(); render();
    },
    addDebt: function () {
      var c = val("d_creditor"); if (!c || !val("d_remaining")) return;
      state.debts.push({ id: uid(), creditor: c, total: num(val("d_total") || val("d_remaining")), remaining: num(val("d_remaining")), rate: num(val("d_rate")), payment: num(val("d_payment")) });
      save(); render();
    },
    delDebt: function (e) { state.debts = state.debts.filter(function (d) { return d.id !== e.id; }); save(); render(); },
    savePlan: function () { commitPlan(); render(); },
    planPrev: function () { commitPlan(); planMonth = prevMonth(planMonth); render(); },
    planNext: function () { commitPlan(); planMonth = nextMonth(planMonth); render(); },
    editDebt: function (e) { editDebtId = e.id; render(); },
    editDebtCancel: function () { editDebtId = null; render(); },
    editDebtSave: function (e) {
      state.debts.forEach(function (d) {
        if (d.id === e.id) { d.creditor = val("ed_creditor") || d.creditor; d.remaining = num(val("ed_remaining")); d.total = num(val("ed_total")); d.rate = num(val("ed_rate")); d.payment = num(val("ed_payment")); }
      });
      editDebtId = null; save(); render();
    },
    addTx: function () {
      if (!val("t_amount")) return;
      state.transactions.push({ id: uid(), date: val("t_date") || today(), type: val("t_type"), category: val("t_cat"), amount: num(val("t_amount")), note: val("t_note") });
      save(); render();
    },
    delTx: function (e) { state.transactions = state.transactions.filter(function (t) { return t.id !== e.id; }); save(); render(); },
    editTx: function (e) { editTxId = e.id; render(); },
    editTxCancel: function () { editTxId = null; render(); },
    editTxSave: function (e) {
      state.transactions.forEach(function (t) { if (t.id === e.id) { t.date = val("et_date") || t.date; t.type = val("et_type"); t.category = val("et_cat"); t.amount = num(val("et_amount")); t.note = val("et_note"); } });
      editTxId = null; save(); render();
    },
    editTrade: function (e) { editTradeId = e.id; render(); },
    editTradeCancel: function () { editTradeId = null; render(); },
    editTradeSave: function (e) {
      state.trading.trades.forEach(function (t) { if (t.id === e.id) { t.date = val("etr_date") || t.date; t.symbol = val("etr_symbol"); t.result = val("etr_result"); t.amount = num(val("etr_amount")); t.note = val("etr_note"); } });
      editTradeId = null; save(); render();
    },
    setBudget: function () { var c = val("bg_cat"), a = num(val("bg_amount")); if (!c || !a) return; if (!state.budgets) state.budgets = {}; state.budgets[c] = a; save(); render(); },
    delBudget: function (e) { if (state.budgets) delete state.budgets[e.c]; save(); render(); },
    addRecurring: function () {
      if (!val("rc_amount")) return;
      state.recurring.push({ id: uid(), type: val("rc_type"), category: val("rc_cat"), amount: num(val("rc_amount")), day: num(val("rc_day")) || 1, note: val("rc_note"), created: ymOfDate(new Date(today() + "T00:00:00")), lastApplied: "" });
      applyRecurring(); save(); render();
    },
    delRecurring: function (e) { state.recurring = state.recurring.filter(function (r) { return r.id !== e.id; }); save(); render(); },
    addSub: function () {
      var n = val("sub_name"); if (!n || !val("sub_amount")) return;
      state.subscriptions.push({ id: uid(), name: n, amount: num(val("sub_amount")), cycle: val("sub_cycle") || "monthly", nextDate: val("sub_date") || "" });
      save(); render();
    },
    delSub: function (e) { state.subscriptions = state.subscriptions.filter(function (x) { return x.id !== e.id; }); save(); render(); },
    em: function (e) { state.emergency.current = num(state.emergency.current) + num(e.amt); save(); paintEmergency(); if (el("em_cur")) el("em_cur").value = num(state.emergency.current); },
    cur: function (e) { state.currency = e.c; save(); render(); },
    moveTab: function (e) {
      var ids = orderedNav().map(function (n) { return n.id; });
      var i = ids.indexOf(e.id), j = i + (e.amt === "up" ? -1 : 1);
      if (i >= 0 && j >= 0 && j < ids.length) { var t = ids[i]; ids[i] = ids[j]; ids[j] = t; state.tabOrder = ids; save(); render(); }
    },
    expJSON: function () { download("finance-backup-" + today() + ".json", JSON.stringify(state, null, 2), "application/json"); },
    expCSV: function () {
      var head = "Date,Type,Category,Amount,Note\n";
      var body = state.transactions.map(function (t) { return [t.date, t.type, t.category, t.amount, '"' + String(t.note || "").replace(/"/g, '""') + '"'].join(","); }).join("\n");
      download("transactions-" + today() + ".csv", head + body, "text/csv");
    },
    saveCfg: function () {
      var raw = val("fb_cfg") || ""; var s = raw.indexOf("{"), e = raw.lastIndexOf("}");
      if (s < 0 || e < 0) { msg("Paste your firebaseConfig object (the part with { ... })."); return; }
      try {
        var obj = (new Function("return (" + raw.slice(s, e + 1) + ")"))();
        if (!obj || !obj.apiKey || !obj.projectId) { msg("That config is missing apiKey or projectId."); return; }
        localStorage.setItem("fb_config", JSON.stringify(obj));
        initCloud(); render();
      } catch (err) { msg("Could not read that config: " + err.message); }
    },
    signInGoogle: function () {
      if (!initCloud()) { msg("Cloud not ready."); return; }
      var provider = new firebase.auth.GoogleAuthProvider();
      cloud.auth.signInWithPopup(provider).catch(function (e) {
        if (e.code === "auth/popup-blocked" || e.code === "auth/cancelled-popup-request" || e.code === "auth/operation-not-supported-in-this-environment") {
          cloud.auth.signInWithRedirect(provider);
        } else { msg(e.message); }
      });
    },
    signOut: function () { if (cloud.auth) cloud.auth.signOut(); },
    editCfg: function () { localStorage.removeItem("fb_config"); location.reload(); },
    impClick: function () { if (el("impFile")) el("impFile").click(); },
    clear: function () { if (confirm("Erase ALL data on this device? Export a backup first if unsure.")) { state = clone(defaultData); save(); render(); } }
  };

  function navBase() {
    return [
      { id: "dashboard", label: "Dashboard", ico: "▥" },
      { id: "goals", label: "Goals", ico: "◎" },
      { id: "debt", label: "Debt", ico: "◍" },
      { id: "emergency", label: "Emergency Fund", ico: "⛨" },
      { id: "transactions", label: "Transactions", ico: "⇄" },
      { id: "recurring", label: "Recurring", ico: "🔁" },
      { id: "subs", label: "Subscriptions", ico: "🧾" },
      { id: "trading", label: "Trading", ico: "💹" },
      { id: "payday", label: "Payday", ico: "⏰" },
      { id: "calc", label: "Calculator", ico: "🧮" },
      { id: "data", label: "Backup / Export", ico: "⤓" }
    ];
  }
  function orderedNav() {
    var base = navBase(), byId = {};
    base.forEach(function (n) { byId[n.id] = n; });
    var out = [];
    (state.tabOrder || []).forEach(function (id) { if (byId[id]) { out.push(byId[id]); delete byId[id]; } });
    base.forEach(function (n) { if (byId[n.id]) out.push(n); });
    return out;
  }
  function tabOrderPanel() {
    var items = orderedNav();
    var rows = items.map(function (n, i) {
      return '<div class="row-between" style="padding:8px 2px;border-bottom:1px solid var(--border)"><span>' + n.ico + ' ' + n.label + '</span><span style="white-space:nowrap">' +
        '<button class="icon-btn" data-act="moveTab" data-id="' + n.id + '" data-amt="up"' + (i === 0 ? ' disabled style="opacity:.3"' : '') + '>▲</button>' +
        '<button class="icon-btn" data-act="moveTab" data-id="' + n.id + '" data-amt="down"' + (i === items.length - 1 ? ' disabled style="opacity:.3"' : '') + '>▼</button>' +
        '</span></div>';
    }).join("");
    return '<div class="panel"><h3>Tab Order</h3><p class="mini" style="margin:-8px 0 10px">Use ▲▼ to reorder the sidebar tabs.</p>' + rows + '</div>';
  }

  function render() {
    if (locked && state.pin) { el("root").innerHTML = lockScreen(); wire(); return; }
    var pages = { dashboard: pageDashboard, goals: pageGoals, debt: pageDebt, emergency: pageEmergency, transactions: pageTransactions, recurring: pageRecurring, subs: pageSubscriptions, trading: pageTrading, payday: pagePayday, calc: pageCompound, data: pageData };
    var nav = orderedNav();
    var sidebar = '<aside class="sidebar"><div class="brand"><span class="dot"></span> Finance</div><nav class="nav">' +
      nav.map(function (n) { return '<button class="' + (currentTab === n.id ? "active" : "") + '" data-tab="' + n.id + '"><span class="ico">' + n.ico + '</span> <span class="label">' + n.label + '</span></button>'; }).join("") +
      '</nav>' +
      '<button class="btn ghost sm" data-act="privacy" style="margin-top:14px;width:100%">' + (privacy ? "👁 Show amounts" : "🙈 Hide amounts") + '</button>' +
      '<button class="btn ghost sm" data-act="theme" style="margin-top:8px;width:100%">' + (theme === "light" ? "🌙 Dark mode" : "☀ Light mode") + '</button>' +
      '<div class="mini" style="margin-top:12px;text-align:center;opacity:.55">' + VERSION + '</div>' +
      '</aside>';
    el("root").innerHTML = '<div class="app">' + sidebar + '<main class="main">' + pages[currentTab]() + '</main></div>';
    wire();
  }

  function wire() {
    var root = el("root");
    root.querySelectorAll("[data-tab]").forEach(function (b) { b.onclick = function () { currentTab = b.getAttribute("data-tab"); render(); }; });
    root.querySelectorAll("[data-act]").forEach(function (b) {
      var act = b.getAttribute("data-act");
      if (act === "filter") { b.value = pageTransactions.filter || "all"; b.onchange = function () { pageTransactions.filter = b.value; render(); }; return; }
      if (actions[act]) b.onclick = function () { actions[act]({ id: b.getAttribute("data-id"), amt: b.getAttribute("data-amt"), c: b.getAttribute("data-c"), k: b.getAttribute("data-k") }); };
    });
    if (el("impFile")) el("impFile").onchange = function (ev) {
      var file = ev.target.files[0]; if (!file) return;
      var reader = new FileReader();
      reader.onload = function (e) {
        try { var obj = JSON.parse(e.target.result); state = Object.assign(clone(defaultData), obj); save(); render(); el("dataMsg").innerHTML = '<div class="hint">✓ Data restored successfully.</div>'; }
        catch (err) { if (el("dataMsg")) el("dataMsg").innerHTML = '<div class="hint" style="color:#fca5a5">✕ Could not read that file.</div>'; }
      };
      reader.readAsText(file);
    };
    // emergency live inputs
    if (el("pln_month")) el("pln_month").onchange = function () { commitPlan(); planMonth = this.value || planMonth; render(); };
    if (el("em_exp")) el("em_exp").oninput = function () { state.emergency.monthlyExpenses = num(this.value); save(); paintEmergency(); };
    if (el("em_cur")) el("em_cur").oninput = function () { state.emergency.current = num(this.value); save(); paintEmergency(); };
    if (el("em_months")) el("em_months").oninput = function () { state.emergency.months = num(this.value); save(); paintEmergency(); };
  }

  // boot
  try {
    state = load();
    try { privacy = localStorage.getItem("ft_privacy") === "1"; } catch (e) {}
    try { theme = localStorage.getItem("ft_theme") || "dark"; } catch (e) {}
    applyTheme();
    if (state.pin) locked = true;
    applyRecurring();
    recordNetWorth();
    render();
    initCloud(); // reconnects automatically if you've set up sync before
    var shield = document.createElement("div");
    shield.id = "ftShield";
    shield.style.cssText = "position:fixed;inset:0;background:#0b1120;display:none;align-items:center;justify-content:center;z-index:99999;font-size:64px";
    shield.textContent = "🔒";
    document.body.appendChild(shield);
    var coverNow = function () { shield.style.display = "flex"; if (state && state.pin) { locked = true; pinBuffer = ""; pinError = false; } };
    var uncover = function () { shield.style.display = "none"; render(); };
    document.addEventListener("visibilitychange", function () { if (document.hidden) coverNow(); else uncover(); });
    window.addEventListener("pagehide", coverNow);
    window.addEventListener("pageshow", uncover);
  } catch (err) {
    document.getElementById("root").innerHTML = '<div style="padding:40px;color:#f87171;font-family:monospace">Error: ' + esc(err.message) + '</div>';
  }
})();
</script>
<script>
/* Remove any old service worker + caches so the app always loads the freshest version */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.getRegistrations().then(function (regs) { regs.forEach(function (r) { r.unregister(); }); }).catch(function () {});
}
if (window.caches && caches.keys) { caches.keys().then(function (ks) { ks.forEach(function (k) { caches.delete(k); }); }).catch(function () {}); }
</script>
</body>
</html>
